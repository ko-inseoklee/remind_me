server:
  port: 8080

spring:
  application:
    name: remind-me-server

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/remind_me?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
        connection-test-query: "SELECT 1"
        initialization-fail-timeout: 1 # 연결 실패 시 즉시 서버 종료 (디버깅용)
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        transaction:
          jta:
            platform: org.hibernate.service.jta.JtaPlatform

  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379

# Swagger (SpringDoc) 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    groups-order: asc
  api-docs:
    path: /api-docs


jwt:
  secret: vnX1xLBxwbIiEP7gwFbnoZP3W4oE8tifVrm4dEKctE4=
  expiration: 3600000 # 1시간 (밀리초 단위)